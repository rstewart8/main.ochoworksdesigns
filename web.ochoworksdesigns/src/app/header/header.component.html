<header class="header">
  <nav class="navbar">
    <div class="nav-container">
      <!-- Logo -->
      <div class="nav-logo">
        <a routerLink="/home" class="logo-link" aria-label="Home" (click)="onLogoClick()">
          <img src="assets/images/8-logo.png" alt="OchoWorks Designs Logo" class="logo-image" width="88" height="70">
        </a>
      </div>

      <!-- Mobile menu toggle -->
      <button class="nav-toggle" type="button" (click)="toggleMobileMenu()" [attr.aria-expanded]="isMobileMenuOpen"
        [ngClass]="{ 'active': isMobileMenuOpen }" aria-controls="nav-menu" aria-label="Toggle navigation menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>

      <!-- Navigation menu -->
      <ul class="nav-menu" id="nav-menu" [class.active]="isMobileMenuOpen" role="menu">
        <!-- Mobile-only user info section (when logged in) -->
        <ng-container *ngIf="isLoggedIn && isMobileMenuOpen">
          <li class="nav-item mobile-only mobile-user-info" role="none">
            <div class="mobile-user-display">
              <span class="user-avatar-mobile">{{ getUserInitials() }}</span>
              <span class="user-email-mobile">{{ currentUser?.email }}</span>
            </div>
          </li>
        </ng-container>

        <!-- Main navigation items -->
        <li class="nav-item" role="none">
          <a routerLink="/home" routerLinkActive="active" class="nav-link" (click)="onNavClick('home')" role="menuitem">
            Home
          </a>
        </li>
        <li class="nav-item" role="none">
          <a routerLink="/about" routerLinkActive="active" class="nav-link" (click)="onNavClick('about')"
            role="menuitem">
            About
          </a>
        </li>
        <li class="nav-item" role="none">
          <a routerLink="/home-builders" routerLinkActive="active" class="nav-link" (click)="onNavClick('builders')"
            role="menuitem">
            Home Builders
          </a>
        </li>
        <li class="nav-item" role="none">
          <a routerLink="/plans" routerLinkActive="active" class="nav-link" (click)="onNavClick('plans')"
            role="menuitem">
            Featured Plans
          </a>
        </li>

        <li class="nav-item" role="none">
          <a [routerLink]="['/blog/list']" routerLinkActive="active" class="nav-link" role="menuitem">
            Blog
          </a>
        </li>

        <li *ngIf="isAdmin()" class="nav-item" role="none">
          <a [routerLink]="['/admin/blog/new']" class="nav-link admin-link" role="menuitem">
            + New Post
          </a>
        </li>

        <li *ngIf="isAdmin()" class="nav-item" role="none">
          <a [routerLink]="['/plan-set']" class="nav-link admin-link" role="menuitem">
            + New Plan
          </a>
        </li>

        <li *ngIf="isAdmin()" class="nav-item" role="none">
          <a [routerLink]="['/admin/marketing']" routerLinkActive="active" class="nav-link admin-link" role="menuitem">
            📧 Marketing
          </a>
        </li>

        <li class="nav-item" role="none">
          <a routerLink="/contact" routerLinkActive="active" class="nav-link" (click)="onNavClick('contact')"
            role="menuitem">
            Contact
          </a>
        </li>

        <li class="nav-item nav-social-item mobile-only" role="none" aria-label="OchoWorks Designs social media links">
          <div class="header-social-links">
            <a class="social-icon-link" href="https://www.facebook.com/OchoWorksDesigns" target="_blank"
              rel="noopener noreferrer" aria-label="OchoWorks Designs on Facebook">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M14 8.5V6.7c0-.9.2-1.4 1.4-1.4H17V2.2c-.8-.1-1.7-.2-2.5-.2-2.7 0-4.6 1.7-4.6 4.7v1.8H7v3.5h2.9v10h3.7v-10h2.9l.5-3.5h-3z" />
              </svg>
            </a>
            <a class="social-icon-link" href="https://www.instagram.com/ochoworksdesigns/" target="_blank"
              rel="noopener noreferrer" aria-label="OchoWorks Designs on Instagram">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M7.7 2h8.6C19.5 2 22 4.5 22 7.7v8.6c0 3.2-2.5 5.7-5.7 5.7H7.7C4.5 22 2 19.5 2 16.3V7.7C2 4.5 4.5 2 7.7 2zm8.5 18c2 0 3.8-1.7 3.8-3.8V7.8C20 5.7 18.3 4 16.2 4H7.8C5.7 4 4 5.7 4 7.8v8.4C4 18.3 5.7 20 7.8 20h8.4zM12 7.1a4.9 4.9 0 1 1 0 9.8 4.9 4.9 0 0 1 0-9.8zm0 7.8a2.9 2.9 0 1 0 0-5.8 2.9 2.9 0 0 0 0 5.8zm5.2-8.9a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4z" />
              </svg>
            </a>
            <a class="social-icon-link" href="https://www.pinterest.com/OchoWorksDesignsandDrafting" target="_blank"
              rel="noopener noreferrer" aria-label="OchoWorks Designs and Drafting on Pinterest">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12.1 2C6.6 2 3 5.7 3 10.4c0 3.1 1.7 5.4 4.4 6.3.5.2.8 0 .9-.5l.3-1.4c.1-.5.1-.6-.3-1.1-.9-1-1.4-2.1-1.4-3.3 0-3.1 2.4-5.9 6.3-5.9 3.4 0 5.3 2.1 5.3 4.9 0 3.7-1.7 6.8-4.1 6.8-1.3 0-2.3-1.1-2-2.4.4-1.6 1.2-3.3 1.2-4.4 0-1-.5-1.9-1.6-1.9-1.3 0-2.3 1.3-2.3 3.1 0 1.1.4 1.9.4 1.9l-1.5 6.4c-.3 1.3-.2 2.8-.1 3.1l.1.1c.2-.2 1.3-1.7 1.7-3l1-3.7c.5.9 1.8 1.7 3.2 1.7 4.2 0 7.1-3.9 7.1-9.1C21.6 4.8 18.2 2 12.1 2z" />
              </svg>
            </a>
          </div>
        </li>

        <!-- Mobile-only authentication and user menu items -->
        <ng-container *ngIf="isMobileMenuOpen">
          <!-- Login link for non-authenticated users -->
          <li class="nav-item mobile-only" *ngIf="!isLoggedIn" role="none">
            <a routerLink="/login" routerLinkActive="active" class="nav-link" (click)="onNavClick('login')"
              role="menuitem">
              Login
            </a>
          </li>

          <!-- User menu items when logged in -->
          <ng-container *ngIf="isLoggedIn">
            <li class="nav-item mobile-only" role="none">
              <a href="#" class="nav-link" (click)="onProfileClick($event)" role="menuitem">
                👤 Profile
              </a>
            </li>
            <li class="nav-item mobile-only" role="none">
              <a href="#" class="nav-link" (click)="onSettingsClick($event)" role="menuitem">
                ⚙️ Settings
              </a>
            </li>
            <li class="nav-item mobile-only" role="none">
              <button class="nav-link logout-mobile" (click)="onLogout()" role="menuitem">
                🚪 Logout
              </button>
            </li>
          </ng-container>
        </ng-container>
      </ul>

      <div class="header-social-links desktop-only" aria-label="OchoWorks Designs social media links">
        <a class="social-icon-link" href="https://www.facebook.com/OchoWorksDesigns" target="_blank"
          rel="noopener noreferrer" aria-label="OchoWorks Designs on Facebook">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M14 8.5V6.7c0-.9.2-1.4 1.4-1.4H17V2.2c-.8-.1-1.7-.2-2.5-.2-2.7 0-4.6 1.7-4.6 4.7v1.8H7v3.5h2.9v10h3.7v-10h2.9l.5-3.5h-3z" />
          </svg>
        </a>
        <a class="social-icon-link" href="https://www.instagram.com/ochoworksdesigns/" target="_blank"
          rel="noopener noreferrer" aria-label="OchoWorks Designs on Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M7.7 2h8.6C19.5 2 22 4.5 22 7.7v8.6c0 3.2-2.5 5.7-5.7 5.7H7.7C4.5 22 2 19.5 2 16.3V7.7C2 4.5 4.5 2 7.7 2zm8.5 18c2 0 3.8-1.7 3.8-3.8V7.8C20 5.7 18.3 4 16.2 4H7.8C5.7 4 4 5.7 4 7.8v8.4C4 18.3 5.7 20 7.8 20h8.4zM12 7.1a4.9 4.9 0 1 1 0 9.8 4.9 4.9 0 0 1 0-9.8zm0 7.8a2.9 2.9 0 1 0 0-5.8 2.9 2.9 0 0 0 0 5.8zm5.2-8.9a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4z" />
          </svg>
        </a>
        <a class="social-icon-link" href="https://www.pinterest.com/OchoWorksDesignsandDrafting" target="_blank"
          rel="noopener noreferrer" aria-label="OchoWorks Designs and Drafting on Pinterest">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12.1 2C6.6 2 3 5.7 3 10.4c0 3.1 1.7 5.4 4.4 6.3.5.2.8 0 .9-.5l.3-1.4c.1-.5.1-.6-.3-1.1-.9-1-1.4-2.1-1.4-3.3 0-3.1 2.4-5.9 6.3-5.9 3.4 0 5.3 2.1 5.3 4.9 0 3.7-1.7 6.8-4.1 6.8-1.3 0-2.3-1.1-2-2.4.4-1.6 1.2-3.3 1.2-4.4 0-1-.5-1.9-1.6-1.9-1.3 0-2.3 1.3-2.3 3.1 0 1.1.4 1.9.4 1.9l-1.5 6.4c-.3 1.3-.2 2.8-.1 3.1l.1.1c.2-.2 1.3-1.7 1.7-3l1-3.7c.5.9 1.8 1.7 3.2 1.7 4.2 0 7.1-3.9 7.1-9.1C21.6 4.8 18.2 2 12.1 2z" />
          </svg>
        </a>
      </div>

      <!-- Desktop-only auth section -->
      <div class="auth-section desktop-only">
        <ng-container *ngIf="!isLoggedIn; else loggedInTemplate">
          <a routerLink="/login" routerLinkActive="active" class="login-link" (click)="onNavClick('login')">
            Login
          </a>
        </ng-container>

        <ng-template #loggedInTemplate>
          <div class="user-menu" [ngClass]="{ 'active': isUserMenuOpen }">
            <button class="user-menu-toggle" type="button" (click)="toggleUserMenu()"
              [attr.aria-expanded]="isUserMenuOpen" aria-label="User menu">
              <span class="user-avatar">
                {{ getUserInitials() }}
              </span>
              <span class="user-name">{{ currentUser?.email }}</span>
              <span class="dropdown-arrow" [ngClass]="{ 'rotated': isUserMenuOpen }">▼</span>
            </button>

            <ul class="user-dropdown" [class.show]="isUserMenuOpen">
              <li>
                <a href="#" class="dropdown-link" (click)="onProfileClick($event)">
                  <span class="dropdown-icon">👤</span>
                  Profile
                </a>
              </li>
              <li>
                <a href="#" class="dropdown-link" (click)="onSettingsClick($event)">
                  <span class="dropdown-icon">⚙️</span>
                  Settings
                </a>
              </li>
              <li class="dropdown-divider"></li>
              <li>
                <button class="dropdown-link logout-button" (click)="onLogout()">
                  <span class="dropdown-icon">🚪</span>
                  Logout
                </button>
              </li>
            </ul>
          </div>
        </ng-template>
      </div>
    </div>
  </nav>
</header>
