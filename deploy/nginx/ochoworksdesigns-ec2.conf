upstream ochoworksdesigns_web {
  server 127.0.0.1:4000;
}

upstream ochoworksdesigns_api {
  server 127.0.0.1:8888;
}

upstream client_ochoworksdesigns_api {
  server 127.0.0.1:8111;
}

server {
  listen 80;
  server_name main.ochoworksdesigns.com;

  location /api/ {
    proxy_pass http://ochoworksdesigns_api/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://ochoworksdesigns_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name client.ochoworksdesigns.com;

  root /var/www/client.ochoworksdesigns/angular-app/dist/client-ochoworksdesigns/browser;
  index index.html;

  location /api/ {
    proxy_pass http://client_ochoworksdesigns_api/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass http://client_ochoworksdesigns_api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
